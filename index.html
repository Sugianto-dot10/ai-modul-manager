<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Modul Ajar AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center fw-bold mb-4">Sistem Manajemen Modul Ajar AI</h2>
        <div class="text-center mb-4">
            <span id="statusKoneksi" class="status-badge bg-secondary text-white">Memeriksa koneksi ke Colab...</span>
        </div>
        
        <div class="row g-4">
            <!-- Form Unggah -->
            <div class="col-md-5">
                <div class="card glass-card border-0 p-4">
                    <h5 class="mb-3">📂 Unggah Modul Baru</h5>
                    <input type="file" id="inpFile" class="form-control mb-3" accept=".pdf">
                    <button onclick="aksiUnggah()" class="btn btn-success w-100" id="btnProses">Proses </button>
                    <div id="statusUnggah" class="mt-3"></div>
                </div>
            </div>

            <!-- Form Pencarian -->
            <div class="col-md-7">
                <div class="card glass-card border-0 p-4">
                    <h5 class="mb-3">🔍 Cari Modul</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="txtCari" class="form-control" placeholder="Contoh: modul ajar sistem komputer...">
                        <button onclick="aksiCari()" class="btn btn-primary">Cari</button>
                    </div>
                    <div id="boxHasil"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI URL INI DENGAN URL NGROK DARI OUTPUT COLAB ANDA
        const URL_API = "https://shaking-greedless-half.ngrok-free.dev"; 
        const ngrokHeaders = { "ngrok-skip-browser-warning": "69420" };
        document.addEventListener("DOMContentLoaded", function() {
        cekKoneksi();
             });

        // Cek status koneksi
        async function cekKoneksi() {
                const badge = document.getElementById('statusKoneksi');
                try {
                    // Kita mencoba mengakses endpoint root untuk tes koneksi
                    const res = await fetch(`${URL_API}/`, { 
                        method: 'GET', 
                        headers: { "ngrok-skip-browser-warning": "69420" } 
                    });
                    if (res.ok || res.status === 404) {
                        badge.className = "badge bg-success";
                        badge.innerText = "● Terhubung ke Colab";
                    }
                } catch (err) {
                    badge.className = "badge bg-danger";
                    badge.innerText = "● Terputus dari Colab";
                }
            }
        cekKoneksi();

        // Fungsi Upload
        async function aksiUnggah() {
            const fileCtrl = document.getElementById('inpFile');
            const statusDiv = document.getElementById('statusUnggah');
            const btn = document.getElementById('btnProses');
            
            if (!fileCtrl.files[0]) return alert("Pilih file PDF terlebih dahulu!");

            btn.disabled = true;
            statusDiv.innerHTML = "Mengunggah dan memproses...";

            const dataForm = new FormData();
            dataForm.append("file", fileCtrl.files[0]);

            try {
                const respon = await fetch(`${URL_API}/upload`, { method: "POST", body: dataForm, headers: ngrokHeaders });
                const hasil = await respon.json();
                statusDiv.innerHTML = `<div class="alert alert-success p-2 small">${hasil.pesan}</div>`;
                fileCtrl.value = "";
            } catch {
                statusDiv.innerHTML = `<div class="alert alert-danger p-2 small">Gagal terhubung ke Colab.</div>`;
            } finally { btn.disabled = false; }
        }

        // Fungsi Cari
       async function aksiCari() {
        const kueri = document.getElementById('txtCari').value;
        const boxHasil = document.getElementById('boxHasil');
        
        if(!kueri) return alert("Masukkan kata kunci!");
        
        try {
            const respon = await fetch(`${URL_API}/search?query=${encodeURIComponent(kueri)}`, { headers: ngrokHeaders });
            const data = await respon.json();
            
            console.log("Data diterima:", data); // CEK DI CONSOLE F12
            
            boxHasil.innerHTML = ""; // Bersihkan hasil lama
            
            if (!data.hasil || data.hasil.length === 0) {
                boxHasil.innerHTML = "<p class='text-muted text-center'>Tidak ada modul ditemukan.</p>";
                return;
            }

            data.hasil.forEach(item => {
                boxHasil.innerHTML += `
                    <div class="p-3 mb-2 bg-white border rounded shadow-sm d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold">${item.nama_file}</div>
                            <small class="text-muted">Folder: ${item.kelas}</small>
                        </div>
                        <button onclick="bukaModul('${item.nama_file}')" class="btn btn-sm btn-primary">Lihat</button>
                    </div>`;
            });
        } catch(err) {
            console.error(err);
            boxHasil.innerHTML = "<p class='text-danger text-center'>Gagal memuat hasil pencarian.</p>";
        }
    }

        // Fungsi Buka PDF (Sangat penting agar sinkron dengan Backend Python Anda)
        async function bukaModul(namaFile) {
            try {
                const respon = await fetch(`${URL_API}/view?nama_file=${encodeURIComponent(namaFile)}`, { headers: ngrokHeaders });
                if (!respon.ok) throw new Error("Gagal mengambil file.");
                
                const blob = await respon.blob();
                const fileURL = URL.createObjectURL(blob);
                window.open(fileURL, '_blank');
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
